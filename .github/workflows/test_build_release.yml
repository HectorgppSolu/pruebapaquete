
name: "Test_Build_Release"

on:
  push:
    branches: ["main", "release"]
  
permissions:
  contents: read
  packages: write

jobs:
  test_build_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
    
      - name: install pnpm
        run: npm install -g pnpm

      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install

      - name: Run tests lint 
        run: pnpm run lint
      
  publish_release_tauri:
    needs: test_build_release
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - platform: [windows-latest]  
            args: ''

    runs-on: windows-latest
    steps:
     - uses: actions/checkout@v4

     - name: setup node
       uses: actions/setup-node@v4
       with:
         node-version: lts/*

     - name: install Rust stable
       uses: dtolnay/rust-toolchain@stable
       with:
        target: x86_64-pc-windows-msvc
    
    
     - name: install dependencies
       if: matrix.platform == 'windows-latest'
       run: |
         sudo apt-get update
         sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
    
     - name: install pnpm
       run: npm install -g pnpm

     - name: Verify versions
       run: |
         node -v
         npm -v
         pnpm -v
 
     - name: install dependencies frontend
       run: pnpm install

     - uses: tauri-apps/tauri-action@v1
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       with:
         tagName: V0.1.0
         releaseName: "Release V0.1.0"
         releaseBody: "See the changelog for more details."
         releaseDraft: false
         perelease: false
         args: ${{ matrix.args }}
    

